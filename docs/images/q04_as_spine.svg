<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 440" style="background:#111111">
  <text x="220" y="26" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Arial" font-weight="bold">Lateral Lumbar Spine — Ankylosing Spondylitis</text>

  <!-- T12 body -->
  <rect x="158" y="48" width="110" height="40" rx="3" fill="#2a2a2a" stroke="#c0c0c0" stroke-width="2"/>
  <!-- T12-L1 disc (ossified, thin) -->
  <rect x="158" y="88" width="110" height="6" rx="0" fill="#3a3a3a" stroke="#888" stroke-width="1"/>
  <!-- L1 body -->
  <rect x="155" y="94" width="114" height="42" rx="3" fill="#2a2a2a" stroke="#c0c0c0" stroke-width="2"/>
  <!-- L1-L2 disc (ossified) -->
  <rect x="154" y="136" width="114" height="6" rx="0" fill="#3a3a3a" stroke="#888" stroke-width="1"/>
  <!-- L2 body -->
  <rect x="152" y="142" width="116" height="44" rx="3" fill="#2a2a2a" stroke="#c0c0c0" stroke-width="2"/>
  <!-- L2-L3 disc = FRACTURE LEVEL -->
  <!-- L3 body -->
  <rect x="154" y="198" width="114" height="46" rx="3" fill="#2a2a2a" stroke="#c0c0c0" stroke-width="2"/>
  <!-- L3-L4 disc (ossified) -->
  <rect x="155" y="244" width="112" height="6" rx="0" fill="#3a3a3a" stroke="#888" stroke-width="1"/>
  <!-- L4 body -->
  <rect x="158" y="250" width="108" height="44" rx="3" fill="#2a2a2a" stroke="#c0c0c0" stroke-width="2"/>

  <!-- Anterior longitudinal ligament ossification (bamboo spine anterior) -->
  <path d="M158 48 L155 94 L152 142 L154 198 L155 250 L158 294" fill="none" stroke="#d8d8d8" stroke-width="3.5"/>
  <!-- Posterior cortex + PLL ossification -->
  <path d="M268 48 L269 94 L268 142 L268 198 L267 250 L266 294" fill="none" stroke="#c8c8c8" stroke-width="3"/>

  <!-- Spinous processes (ossified interspinous ligaments) -->
  <rect x="268" y="56" width="32" height="10" rx="2" fill="#2a2a2a" stroke="#b0b0b0" stroke-width="1.5"/>
  <line x1="268" y1="61" x2="300" y2="61" stroke="#c0c0c0" stroke-width="1.5"/>
  <rect x="268" y="104" width="32" height="10" rx="2" fill="#2a2a2a" stroke="#b0b0b0" stroke-width="1.5"/>
  <line x1="268" y1="109" x2="300" y2="109" stroke="#c0c0c0" stroke-width="1.5"/>
  <rect x="268" y="155" width="32" height="10" rx="2" fill="#2a2a2a" stroke="#b0b0b0" stroke-width="1.5"/>
  <line x1="268" y1="160" x2="300" y2="160" stroke="#ff4444" stroke-width="2"/>
  <rect x="268" y="210" width="32" height="10" rx="2" fill="#2a2a2a" stroke="#b0b0b0" stroke-width="1.5"/>
  <rect x="268" y="260" width="32" height="10" rx="2" fill="#2a2a2a" stroke="#b0b0b0" stroke-width="1.5"/>

  <!-- FRACTURE LINE — 3-column through L2-L3 disc level -->
  <!-- Anterior column fracture line -->
  <line x1="148" y1="188" x2="272" y2="193" stroke="#ffffff" stroke-width="3"/>
  <!-- Middle + posterior fracture gaping -->
  <line x1="148" y1="192" x2="272" y2="198" stroke="#ffffff" stroke-width="2"/>
  <!-- Posterior gap highlighted (hyperextension — posterior opens) -->
  <path d="M268 155 L272 190" stroke="#ff4444" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- Displacement marker -->
  <path d="M152 188 Q210 195 268 190" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Vertebral labels -->
  <text x="310" y="72" fill="#888888" font-size="10" font-family="Arial">T12</text>
  <text x="310" y="120" fill="#888888" font-size="10" font-family="Arial">L1</text>
  <text x="310" y="168" fill="#ff4444" font-size="10" font-family="Arial" font-weight="bold">L2 ★</text>
  <text x="310" y="225" fill="#888888" font-size="10" font-family="Arial">L3</text>
  <text x="310" y="276" fill="#888888" font-size="10" font-family="Arial">L4</text>

  <!-- Bamboo spine label -->
  <text x="30" y="80" fill="#ffdd00" font-size="9" font-family="Arial">Bamboo</text>
  <text x="30" y="92" fill="#ffdd00" font-size="9" font-family="Arial">spine</text>
  <text x="30" y="104" fill="#ffdd00" font-size="9" font-family="Arial">(ossified)</text>
  <line x1="98" y1="90" x2="155" y2="110" stroke="#ffdd00" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 3-column fracture label -->
  <rect x="10" y="152" width="135" height="36" rx="4" fill="#1e1e1e" stroke="#ff4444" stroke-width="1.5"/>
  <text x="77" y="168" text-anchor="middle" fill="#ff4444" font-size="9" font-family="Arial" font-weight="bold">3-Column Fracture</text>
  <text x="77" y="181" text-anchor="middle" fill="#cccccc" font-size="8.5" font-family="Arial">Ant + Mid + Post unstable</text>
  <line x1="145" y1="168" x2="152" y2="188" stroke="#ff4444" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Annotation -->
  <rect x="10" y="310" width="420" height="118" rx="5" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="20" y="328" fill="#ffdd00" font-size="10" font-family="Arial" font-weight="bold">AS Spine Fracture — "Long Bone" Biomechanics</text>
  <text x="20" y="344" fill="#cccccc" font-size="10" font-family="Arial">Fused bamboo spine acts as a single long bone — fractures are</text>
  <text x="20" y="360" fill="#cccccc" font-size="10" font-family="Arial">inherently 3-column, highly unstable, even from minor trauma</text>
  <text x="20" y="376" fill="#cccccc" font-size="10" font-family="Arial">Hyperextension mechanism → posterior gaping / cord injury risk</text>
  <text x="20" y="392" fill="#ff4444" font-size="10" font-family="Arial" font-weight="bold">→ Long-segment posterior instrumentation ≥3 levels above &amp; below</text>
  <text x="20" y="408" fill="#ff4444" font-size="10" font-family="Arial" font-weight="bold">   ± anterior column support if significant bone loss</text>
</svg>
