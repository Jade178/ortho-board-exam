<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 380" style="background:#111111">
  <text x="210" y="26" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Arial" font-weight="bold">AP Foot — 5th Metatarsal Base Fracture</text>

  <!-- Cuboid -->
  <path d="M130 140 Q128 110 140 100 Q165 95 180 105 Q188 115 185 140 Z" fill="#2e2e2e" stroke="#c0c0c0" stroke-width="1.8"/>

  <!-- 4th metatarsal base -->
  <path d="M185 135 L182 105 L210 100 L215 130 Z" fill="#2a2a2a" stroke="#b8b8b8" stroke-width="1.5"/>

  <!-- 5th metatarsal — full bone -->
  <path d="M155 140 L148 105 Q150 90 160 85 Q170 82 178 88 Q186 95 184 108 L190 140 Q175 145 155 140Z" fill="#2e2e2e" stroke="#c8c8c8" stroke-width="2.2"/>
  <!-- Styloid process / tuberosity at base -->
  <path d="M148 110 Q135 108 130 118 Q128 130 140 134 Q150 136 155 130" fill="#333" stroke="#c0c0c0" stroke-width="1.8"/>
  <!-- 5th MT shaft -->
  <path d="M182 140 L188 240 Q188 255 182 260 Q175 264 168 260 Q162 255 162 240 L162 140 Z" fill="#2a2a2a" stroke="#c0c0c0" stroke-width="2"/>
  <!-- 5th MT head -->
  <ellipse cx="175" cy="268" rx="16" ry="12" fill="#2e2e2e" stroke="#c0c0c0" stroke-width="1.8"/>

  <!-- FRACTURE LINE — Jones fracture zone (Torg II: metaphyseal-diaphyseal junction) -->
  <!-- Cortical thickening/sclerosis (Torg II sign) -->
  <path d="M162 155 Q155 152 151 158 Q148 165 153 170 Q158 174 164 172" fill="none" stroke="#ffdd00" stroke-width="3"/>
  <path d="M182 155 Q188 152 191 158 Q193 165 189 170 Q184 173 181 170" fill="none" stroke="#ffdd00" stroke-width="3"/>
  <!-- Fracture line with partial bridging callus -->
  <line x1="160" y1="163" x2="184" y2="160" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Partial callus/sclerosis bridging -->
  <path d="M162 165 Q172 162 182 165" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Zone labels -->
  <rect x="200" y="90" width="115" height="20" rx="3" fill="#1a3a1a" stroke="#44aa44" stroke-width="1"/>
  <text x="257" y="104" text-anchor="middle" fill="#44ff44" font-size="9" font-family="Arial">Zone 1: Avulsion (styloid)</text>

  <rect x="200" y="130" width="115" height="20" rx="3" fill="#3a1a1a" stroke="#ff4444" stroke-width="1"/>
  <text x="257" y="144" text-anchor="middle" fill="#ff6666" font-size="9" font-family="Arial">Zone 2: Jones (meta-diaphys)</text>
  <line x1="200" y1="140" x2="185" y2="163" stroke="#ff4444" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="200" y="175" width="115" height="20" rx="3" fill="#1a1a3a" stroke="#4444ff" stroke-width="1"/>
  <text x="257" y="189" text-anchor="middle" fill="#8888ff" font-size="9" font-family="Arial">Zone 3: Diaphyseal stress</text>

  <!-- Torg II sclerosis label -->
  <text x="62" y="158" fill="#ffdd00" font-size="9" font-family="Arial">Torg II:</text>
  <text x="55" y="170" fill="#ffdd00" font-size="9" font-family="Arial">Intramedullary</text>
  <text x="55" y="182" fill="#ffdd00" font-size="9" font-family="Arial">sclerosis +</text>
  <text x="55" y="194" fill="#ffdd00" font-size="9" font-family="Arial">delayed union</text>
  <line x1="110" y1="166" x2="152" y2="163" stroke="#ffdd00" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Annotation -->
  <rect x="10" y="305" width="400" height="66" rx="5" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="20" y="323" fill="#ffdd00" font-size="10" font-family="Arial" font-weight="bold">Torg Classification (Jones fracture):</text>
  <text x="20" y="339" fill="#cccccc" font-size="10" font-family="Arial">I = Acute (no sclerosis)   II = Delayed union (intramedullary sclerosis)</text>
  <text x="20" y="355" fill="#cccccc" font-size="10" font-family="Arial">III = Non-union (complete obliteration of medullary canal)</text>
  <text x="20" y="371" fill="#ff4444" font-size="10" font-family="Arial" font-weight="bold">Torg II → Intramedullary screw fixation</text>
</svg>
