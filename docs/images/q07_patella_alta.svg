<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" style="background:#111111">
  <text x="240" y="26" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Arial" font-weight="bold">Lateral Knee Radiograph — Patellar Height</text>

  <!-- Distal femur -->
  <path d="M180 40 L180 160 Q180 195 200 210 Q220 225 240 225 Q260 225 280 210 Q300 195 300 160 L300 40" fill="#2c2c2c" stroke="#c8c8c8" stroke-width="2.5"/>
  <!-- Trochlear groove indication -->
  <path d="M220 180 Q240 170 260 180" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- Tibia proximal -->
  <path d="M195 290 L195 360 L305 360 L305 290 Q305 270 295 265 Q270 258 240 258 Q210 258 185 265 Q175 270 175 290Z" fill="#2c2c2c" stroke="#c8c8c8" stroke-width="2.5"/>
  <!-- Tibial plateau -->
  <line x1="175" y1="270" x2="305" y2="265" stroke="#bbbbbb" stroke-width="1.5"/>

  <!-- Tibial tuberosity -->
  <path d="M195 285 Q190 295 195 310 Q205 315 215 308 Q220 295 215 285Z" fill="#3a3a3a" stroke="#c0c0c0" stroke-width="1.5"/>

  <!-- Patella — high position (patella alta) -->
  <ellipse cx="240" cy="185" rx="26" ry="18" fill="#303030" stroke="#d0d0d0" stroke-width="2.5"/>

  <!-- Patellar tendon -->
  <path d="M240 203 Q232 230 210 255" fill="none" stroke="#a0a0a0" stroke-width="3"/>

  <!-- Caton-Deschamps measurement lines -->
  <!-- AT (patellar tendon length) -->
  <line x1="245" y1="203" x2="217" y2="257" stroke="#00ddff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- TT (tibial tuberosity to articular surface) -->
  <line x1="207" y1="257" x2="207" y2="265" stroke="#ffdd00" stroke-width="2"/>

  <!-- Measurement brackets -->
  <line x1="260" y1="203" x2="260" y2="262" stroke="#00ddff" stroke-width="1.5"/>
  <line x1="256" y1="203" x2="264" y2="203" stroke="#00ddff" stroke-width="1.5"/>
  <line x1="256" y1="262" x2="264" y2="262" stroke="#00ddff" stroke-width="1.5"/>
  <text x="268" y="235" fill="#00ddff" font-size="11" font-family="Arial" font-weight="bold">AT</text>

  <!-- Tibial articular surface to TT -->
  <line x1="175" y1="265" x2="195" y2="265" stroke="#ffdd00" stroke-width="1.5"/>
  <line x1="175" y1="290" x2="195" y2="290" stroke="#ffdd00" stroke-width="1.5"/>
  <line x1="181" y1="265" x2="181" y2="290" stroke="#ffdd00" stroke-width="1.5"/>
  <line x1="177" y1="265" x2="185" y2="265" stroke="#ffdd00" stroke-width="1.5"/>
  <line x1="177" y1="290" x2="185" y2="290" stroke="#ffdd00" stroke-width="1.5"/>
  <text x="145" y="280" fill="#ffdd00" font-size="11" font-family="Arial" font-weight="bold">TT</text>

  <!-- Blumensaat line -->
  <line x1="200" y1="225" x2="290" y2="195" stroke="#ff8800" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="295" y="193" fill="#ff8800" font-size="9" font-family="Arial">Blumensaat</text>

  <!-- CD ratio annotation -->
  <rect x="10" y="308" width="460" height="62" rx="5" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="20" y="326" fill="#ffdd00" font-size="10" font-family="Arial" font-weight="bold">Caton-Deschamps ratio = AT / TT (Normal: 0.6–1.3)</text>
  <text x="20" y="342" fill="#cccccc" font-size="10" font-family="Arial">This film: patella alta — patella sitting proximal to Blumensaat line</text>
  <text x="20" y="358" fill="#ff4444" font-size="10" font-family="Arial" font-weight="bold">CD = 1.4 → Patella alta (threshold for TT osteotomy consideration)</text>
</svg>
